<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>WordLens 生词本</title>
<link rel="stylesheet" href="vocab.css" />
</head>
<body>
  <header class="wl-page-header">
    <div class="wl-page-title">
      <span class="wl-logo-dot"></span>
      <h1>我的生词本</h1>
    </div>
    <input id="search" type="search" placeholder="搜索生词或翻译…" />
  </header>

  <div class="wl-toolbar">
    <span id="count" class="wl-count">0 个生词</span>
    <div class="wl-toolbar-actions">
      <button id="exportCsv" class="wl-btn secondary">导出为 CSV</button>
      <button id="exportAnki" class="wl-btn secondary">导出给 Anki</button>
      <button id="clearAll" class="wl-btn danger">清空生词本</button>
    </div>
  </div>

  <main>
    <div id="empty" class="wl-empty" hidden>
      <p>还没有收藏任何生词。</p>
      <p class="wl-empty-sub">在网页上选中文字，点击翻译卡片里的「★ 收藏」按钮就会出现在这里。</p>
    </div>
    <table id="table" class="wl-table" hidden>
      <thead>
        <tr>
          <th>原文</th>
          <th>翻译</th>
          <th>释义 / 例句</th>
          <th>收藏时间</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </main>

  <script src="vocab.js"></script>
</body>
</html>
