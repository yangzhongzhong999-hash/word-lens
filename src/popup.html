<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>WordLens 设置</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="wl-header">
    <div class="wl-logo"><span class="wl-logo-dot"></span>WordLens</div>
    <div class="wl-sub">划词翻译 · 词镜</div>
  </header>

  <main class="wl-main">
    <label class="wl-field">
      <span class="wl-field-label">启用插件</span>
      <input type="checkbox" id="enabled" />
    </label>

    <label class="wl-field">
      <span class="wl-field-label">翻译目标语言</span>
      <select id="targetLang">
        <option value="zh-CN">中文（简体）</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="de">Deutsch</option>
      </select>
    </label>

    <p class="wl-hint">
      选中任意网页上的文字，会出现一个小圆钥按钮，点击即可弹出翻译卡片。英文单词还会显示音标和释义，点「★ 收藏」可以存进生词本。
    </p>

    <button id="openVocab" class="wl-vocab-btn">📓 打开生词本</button>
  </main>

  <footer class="wl-footer">
    <a href="https://github.com/" target="_blank" rel="noopener">GitHub 仓库</a>
    <span class="wl-version">v0.2.0</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
